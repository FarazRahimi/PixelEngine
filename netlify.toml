# Vite build → dist/; classic single-page app copied from public/classic.html
[build]
  publish = "dist"
  command = "npm ci && npm run build"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-store"
